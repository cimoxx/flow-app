<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flow V20 Online</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/safe.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --accent: #6366f1; /* Indigo */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #020617;
                --bg-card: #0f172a;
                --text-main: #f1f5f9;
                --text-dim: #94a3b8;
                --border: #1e293b;
                --accent: #818cf8;
            }
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; transition: background 0.3s; }
        .app-container { background-color: var(--bg-card); color: var(--text-main); }
        .processed { opacity: 0.3; filter: grayscale(1); }
        
        /* 3x menšie kategórie (Grid 4 stĺpce) */
        .cat-tile { transition: all 0.2s; border: 1px solid var(--border); cursor: pointer; height: 58px; background: var(--bg-card); color: var(--text-dim); }
        .cat-tile.selected { border-color: var(--accent); background-color: rgba(99, 102, 241, 0.1); color: var(--accent); border-width: 2px; }
        .cat-tile i { width: 14px; height: 14px; margin-bottom: 2px; }
        .cat-tile span { font-size: 7px; line-height: 1; text-align: center; font-weight: 700; padding: 0 2px; }

        .sub-chip { transition: all 0.2s; cursor: pointer; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-dim); font-size: 9px; }
        .sub-chip.active { background-color: var(--accent); color: white; border-color: var(--accent); }
        
        .glass-nav { background: var(--bg-card); border-top: 1px solid var(--border); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .summary-card { transition: all 0.3s; border: 1px solid var(--border); min-width: 90px; background: var(--bg-card); }
        .summary-card.active-filter { border-color: var(--accent); background-color: rgba(99, 102, 241, 0.1); transform: scale(1.03); }
        
        input, select, textarea { background: var(--bg-main) !important; color: var(--text-main) !important; border: 1px solid var(--border) !important; border-radius: 12px !important; }
        .transaction-item { background: var(--bg-card); border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col pb-24 app-container shadow-2xl">
    <header class="p-5 border-b sticky top-0 z-20 app-container">
        <div class="flex justify-between items-end mb-4">
            <div class="flex items-center gap-3">
                <img src="https://img.icons8.com/fluency/48/safe.png" class="w-9 h-9" alt="Flow Icon">
                <div>
                    <span class="text-[9px] font-black uppercase text-slate-400 tracking-widest">Prehľad</span>
                    <div id="display-balance" class="text-2xl font-bold tracking-tighter">0,00 €</div>
                </div>
            </div>
            <div id="sync-status" onclick="manualSync()" class="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full cursor-pointer">
                <div id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span id="sync-text" class="text-[9px] font-black text-slate-500 uppercase">OK</span>
            </div>
        </div>
        <div id="category-summary" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>
    </header>

    <main class="p-4 flex-1">
        <div class="flex flex-col gap-3 mb-4">
            <div class="flex gap-2">
                <select id="filter-month" onchange="renderList()" class="flex-1 text-[11px] font-bold p-2 outline-none"></select>
                <select id="filter-year" onchange="renderList()" class="w-20 text-[11px] font-bold p-2 outline-none"></select>
            </div>
            <div class="flex items-center justify-between px-1">
                <select id="ui-filter" onchange="renderList()" class="text-[9px] font-black uppercase bg-transparent outline-none border-none !p-0">
                    <option value="unprocessed">Neprepísané</option>
                    <option value="all">Všetky</option>
                </select>
                <button id="clear-cat-filter" onclick="resetCategoryFilter()" class="hidden text-[9px] font-bold text-indigo-500 uppercase tracking-wider">Zrušiť filter X</button>
            </div>
        </div>
        <div id="transaction-list" class="space-y-1"></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass-nav flex justify-around items-center h-16 z-30">
        <button onclick="showScreen('home')" class="text-indigo-500 p-4"><i data-lucide="layout-grid"></i></button>
        <button onclick="openModal()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg -mt-8 border-4 border-white dark:border-slate-900 active:scale-95 transition-transform"><i data-lucide="plus" class="w-7 h-7"></i></button>
        <button onclick="showScreen('settings')" class="text-slate-400 p-4"><i data-lucide="settings"></i></button>
    </nav>
</div>

<div id="modal-overlay" class="fixed inset-0 bg-slate-900/80 z-[40] hidden backdrop-blur-sm flex items-end">
    <div class="bg-white dark:bg-slate-900 w-full max-w-md mx-auto rounded-t-[2rem] p-5 shadow-2xl max-h-[92vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4 sticky top-0 bg-white dark:bg-slate-900 pb-2 z-10">
            <button onclick="closeModal()" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Zavrieť</button>
            <button onclick="document.getElementById('save-trigger').click()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-md">ULOŽIŤ</button>
        </div>
        <form id="entry-form" onsubmit="handleSave(event)" class="space-y-4">
            <input type="submit" id="save-trigger" class="hidden">
            <input type="hidden" id="entry-id">
            
            <div class="flex gap-1.5 p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
                <button type="button" onclick="setUser('Lukáš')" id="u-Lukáš" class="flex-1 py-1.5 rounded-lg text-[9px] font-black transition-all">LUKÁŠ</button>
                <button type="button" onclick="setUser('Zdenka')" id="u-Zdenka" class="flex-1 py-1.5 rounded-lg text-[9px] font-black transition-all">ZDENKA</button>
            </div>

            <input type="number" id="f-amount" inputmode="decimal" step="0.01" placeholder="0.00" class="w-full text-center text-4xl font-bold py-1 outline-none border-none bg-transparent !p-0" required>
            
            <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
                <button type="button" id="t-ex" onclick="setType('expense')" class="flex-1 py-1.5 rounded-lg text-[9px] font-black">VÝDAVOK</button>
                <button type="button" id="t-in" onclick="setType('income')" class="flex-1 py-1.5 rounded-lg text-[9px] font-black">PRÍJEM</button>
            </div>

            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1.5 px-1 tracking-widest">Kategória</label>
                <div id="cat-grid" class="grid grid-cols-4 gap-1.5"></div>
            </div>

            <div id="sub-section" class="hidden">
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1.5 px-1 tracking-widest">Podkategória</label>
                <div id="sub-grid" class="flex flex-wrap gap-1.5"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="f-note" placeholder="Poznámka..." class="p-3 text-xs outline-none">
                <input type="date" id="f-date" class="p-3 text-xs outline-none">
            </div>
            
            <button type="button" id="del-btn" onclick="handleDelete()" class="w-full text-red-500 text-[9px] font-black uppercase pt-2 hidden">Zmazať záznam</button>
        </form>
    </div>
</div>

<div id="settings-screen" class="fixed inset-0 bg-white dark:bg-slate-900 z-50 hidden p-6 max-w-md mx-auto overflow-y-auto pb-24">
    <div id="settings-home">
        <div class="flex items-center gap-4 mb-6"><button onclick="showScreen('home')" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-xl"><i data-lucide="arrow-left"></i></button><h2 class="text-xl font-bold">Nastavenia</h2></div>
        <div class="flex gap-2 mb-6">
            <button onclick="fullCloudPull(true)" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-[9px] uppercase">Stiahnuť Dáta</button>
            <button onclick="syncCategories('pull')" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold text-[9px] uppercase">Kategórie</button>
        </div>
        <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl mb-4 border border-slate-200 dark:border-slate-700">
            <input type="text" id="new-cat-name" placeholder="Názov kategórie..." class="w-full p-3 rounded-xl mb-2 text-sm outline-none">
            <button onclick="addCategory()" class="w-full py-3 bg-indigo-500 text-white rounded-xl font-bold text-[9px] uppercase">Pridať</button>
        </div>
        <div id="manage-cats-list" class="space-y-2 mb-8"></div>
        <button onclick="hardResetCategories()" class="w-full py-4 border-2 border-dashed border-red-100 text-red-400 rounded-2xl text-[9px] font-black uppercase">Reset kategórií</button>
    </div>
    <div id="sub-editor" class="hidden">
        <div class="flex items-center gap-4 mb-6"><button onclick="closeSubEditor()" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-xl"><i data-lucide="arrow-left"></i></button><h2 id="sub-editor-title" class="text-xl font-bold"></h2></div>
        <div id="manage-subs-list" class="space-y-2 mb-4"></div>
        <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl">
            <input type="text" id="new-sub-name" placeholder="Názov podkategórie..." class="w-full p-3 rounded-xl mb-2 text-sm outline-none">
            <button onclick="addSubCategory()" class="w-full py-3 bg-indigo-500 text-white rounded-xl font-bold text-[9px] uppercase">Pridať podkategóriu</button>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbyr4_z3J4_Bsv6tqlUOs4kHgMSy61urNPzWd2fvOEqvjuC-vMlKnDuto9RXVxH-l4hDLw/exec';
    
    const defaultCategories = [
        { id: 'Domácnosť', icon: 'home', subs: [] }, { id: 'Doprava', icon: 'car', subs: [] }, { id: 'Poistenie', icon: 'shield-check', subs: [] },
        { id: 'Strava', icon: 'utensils', subs: [] }, { id: 'Deti', icon: 'baby', subs: [] }, { id: 'Domáce zvieratá', icon: 'dog', subs: [] },
        { id: 'Osobná starostlivosť', icon: 'heart', subs: [] }, { id: 'Zábava/Dovolenky', icon: 'palmtree', subs: [] },
        { id: 'Dane', icon: 'landmark', subs: [] }, { id: 'Darčeky', icon: 'gift', subs: [] }, { id: 'Iné', icon: 'layers', subs: [] },
        { id: 'Úspory alebo investície', icon: 'trending-up', subs: [] }
    ];

    let db = JSON.parse(localStorage.getItem('f_db_v20')) || [];
    let syncQueue = JSON.parse(localStorage.getItem('f_sync_q_v20')) || [];
    let categories = JSON.parse(localStorage.getItem('f_cats_v20')) || defaultCategories;
    let curUser = localStorage.getItem('f_last_user') || 'Lukáš';
    let curType = 'expense', selectedCat = '', selectedSub = '', activeCategoryFilter = null, isSyncing = false, editingCatIdx = null;

    // --- SYNCHRONIZÁCIA ---
    async function syncCategories(action = 'push') {
        updateSyncUI('syncing');
        if (action === 'push') {
            try { await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'sync_categories', categories: categories }) }); } catch (e) { }
        } else {
            try {
                const res = await fetch(GOOGLE_URL + "?get=categories");
                const cloudData = await res.json();
                if(Array.isArray(cloudData) && cloudData.length > 0 && cloudData[0].id) {
                    categories = cloudData;
                    localStorage.setItem('f_cats_v20', JSON.stringify(categories));
                    renderCatGrid();
                    if(!document.getElementById('settings-screen').classList.contains('hidden')) renderManageCats();
                }
            } catch (e) { }
        }
        updateSyncUI('ok');
    }

    async function fullCloudPull(manual = false) {
        if(manual && !confirm("Stiahnuť dáta?")) return;
        updateSyncUI('syncing');
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            if(Array.isArray(data)) {
                db = data.filter(x => x.id && String(x.id).startsWith('ID-')).map(item => ({ 
                    ...item, date: item.date ? String(item.date).split('T')[0] : '', amount: parseFloat(item.amount), processed: item.processed === "ÁNO" 
                }));
                saveData(false); renderList();
            }
        } catch (e) {}
        updateSyncUI('ok');
    }

    async function processSyncQueue() { 
        if (syncQueue.length === 0 || isSyncing) return; 
        isSyncing = true; updateSyncUI('syncing'); 
        while (syncQueue.length > 0) { 
            try { 
                await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(syncQueue[0]) }); 
                syncQueue.shift(); saveData(false); 
            } catch (e) { break; } 
        } 
        isSyncing = false; updateSyncUI('ok'); 
    }

    // --- RENDERING ---
    function renderList() {
        const list = document.getElementById('transaction-list');
        const selMonth = parseInt(document.getElementById('filter-month').value);
        const selYear = parseInt(document.getElementById('filter-year').value);
        const filterStatus = document.getElementById('ui-filter').value;
        let filtered = db.filter(d => { const dt = new Date(d.date); return dt.getMonth() === selMonth && dt.getFullYear() === selYear; });
        let summaryData = filtered;
        if(filterStatus === 'unprocessed') summaryData = summaryData.filter(d => !d.processed);
        const sums = {};
        summaryData.forEach(item => { if (item.type === 'expense') sums[item.category] = (sums[item.category] || 0) + item.amount; });
        renderSummary(sums);
        if(filterStatus === 'unprocessed') filtered = filtered.filter(d => !d.processed);
        if(activeCategoryFilter) filtered = filtered.filter(d => d.category === activeCategoryFilter);
        document.getElementById('clear-cat-filter').classList.toggle('hidden', !activeCategoryFilter);
        list.innerHTML = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).map(item => `
            <div class="transaction-item p-3.5 flex items-center justify-between ${item.processed ? 'processed' : ''}">
                <div class="flex-1" onclick="openModal('${item.id}')">
                    <div class="flex justify-between items-center pr-3">
                        <span class="font-semibold text-xs">${item.category}${item.sub ? ' <span class="text-slate-400 font-normal">/</span> '+item.sub : ''}</span>
                        <span class="font-bold text-xs ${item.type === 'income' ? 'text-green-500' : ''}">${item.amount.toFixed(2)}€</span>
                    </div>
                    <div class="text-[8px] font-bold text-slate-400 uppercase tracking-tight mt-0.5">${item.user || 'Lukáš'} ${item.note ? '• '+item.note : ''}</div>
                </div>
                <button onclick="toggleProcessed('${item.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center border ${item.processed ? 'bg-indigo-600 text-white border-indigo-600' : 'border-slate-200 dark:border-slate-800 text-slate-300'}"><i data-lucide="check" class="w-4 h-4"></i></button>
            </div>`).join('');
        updateTotals(); lucide.createIcons();
    }

    function renderSummary(sums) {
        const container = document.getElementById('category-summary');
        container.innerHTML = Object.keys(sums).sort((a,b) => sums[b] - sums[a]).map(cat => `
            <div onclick="toggleFilter('${cat}')" class="summary-card flex-shrink-0 px-3 py-1.5 rounded-xl cursor-pointer ${activeCategoryFilter === cat ? 'active-filter' : ''}">
                <div class="text-[7px] font-black ${activeCategoryFilter === cat ? 'text-indigo-600' : 'text-slate-400'} uppercase truncate">${cat}</div>
                <div class="text-[10px] font-bold">${sums[cat].toFixed(2)}€</div>
            </div>`).join('');
    }

    function renderCatGrid() { 
        document.getElementById('cat-grid').innerHTML = categories.map(c => `
            <button type="button" onclick="selectCat('${c.id}')" data-id="${c.id}" class="cat-tile flex flex-col items-center justify-center p-1 rounded-xl shadow-sm">
                <i data-lucide="${c.icon || 'layers'}"></i>
                <span class="truncate w-full">${c.id}</span>
            </button>`).join(''); 
        lucide.createIcons(); 
    }

    // --- FORM LOGIKA ---
    function setUser(u) {
        curUser = u; localStorage.setItem('f_last_user', u);
        ['Lukáš', 'Zdenka'].forEach(user => {
            const btn = document.getElementById(`u-${user}`);
            btn.className = user === u ? 'flex-1 py-1.5 rounded-lg text-[9px] font-black bg-white dark:bg-slate-700 text-indigo-600 shadow-sm' : 'flex-1 py-1.5 rounded-lg text-[9px] font-black text-slate-400';
        });
    }

    function setType(t) {
        curType = t;
        document.getElementById('t-ex').className = t === 'expense' ? 'flex-1 py-1.5 rounded-lg text-[9px] font-black bg-white dark:bg-slate-700 text-red-500 shadow-sm' : 'flex-1 py-1.5 rounded-lg text-[9px] font-black text-slate-400';
        document.getElementById('t-in').className = t === 'income' ? 'flex-1 py-1.5 rounded-lg text-[9px] font-black bg-white dark:bg-slate-700 text-green-500 shadow-sm' : 'flex-1 py-1.5 rounded-lg text-[9px] font-black text-slate-400';
    }

    function selectCat(id) { 
        selectedCat = id; selectedSub = ''; 
        document.querySelectorAll('.cat-tile').forEach(el => el.classList.toggle('selected', el.dataset.id === id)); 
        const cat = categories.find(c => c.id === id); 
        if(cat && cat.subs.length > 0) { 
            document.getElementById('sub-section').classList.remove('hidden'); 
            document.getElementById('sub-grid').innerHTML = cat.subs.map(s => `<button type="button" onclick="selectSub('${s}')" data-sub="${s}" class="sub-chip px-2.5 py-1.5 rounded-lg font-bold uppercase shadow-sm">${s}</button>`).join(''); 
        } else { 
            document.getElementById('sub-section').classList.add('hidden'); 
        } 
    }

    function selectSub(s) { selectedSub = s; document.querySelectorAll('.sub-chip').forEach(el => el.classList.toggle('active', el.dataset.sub === s)); }

    function handleSave(e) {
        e.preventDefault();
        let id = document.getElementById('entry-id').value || 'ID-' + Date.now();
        const entry = { id, date: document.getElementById('f-date').value, category: selectedCat, sub: selectedSub, amount: parseFloat(document.getElementById('f-amount').value), type: curType, note: document.getElementById('f-note').value, user: curUser, processed: false, action: 'save' };
        const idx = db.findIndex(x => String(x.id) === String(id));
        if (idx > -1) { entry.processed = db[idx].processed; db[idx] = entry; } else { db.push(entry); }
        syncQueue.push(entry); saveData(false); closeModal(); renderList(); processSyncQueue();
    }

    function openModal(id = null) {
        document.getElementById('modal-overlay').classList.remove('hidden');
        renderCatGrid();
        if(id) {
            const i = db.find(x => String(x.id) === String(id));
            document.getElementById('entry-id').value = i.id; document.getElementById('f-amount').value = i.amount;
            document.getElementById('f-note').value = i.note; document.getElementById('f-date').value = i.date;
            setUser(i.user || 'Lukáš'); setType(i.type); selectCat(i.category);
            if(i.sub) setTimeout(() => selectSub(i.sub), 50);
            document.getElementById('del-btn').classList.remove('hidden');
        } else {
            document.getElementById('entry-form').reset(); document.getElementById('f-date').valueAsDate = new Date();
            setUser(localStorage.getItem('f_last_user') || 'Lukáš'); setType('expense'); selectCat(categories[0]?.id || '');
            document.getElementById('del-btn').classList.add('hidden');
        }
    }

    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
    function showScreen(s) { document.getElementById('settings-screen').classList.toggle('hidden', s !== 'settings'); if(s === 'settings') renderManageCats(); else renderList(); }
    function toggleFilter(cat) { activeCategoryFilter = (activeCategoryFilter === cat) ? null : cat; renderList(); }
    function resetCategoryFilter() { activeCategoryFilter = null; renderList(); }
    function toggleProcessed(id) { db = db.map(x => String(x.id) === String(id) ? {...x, processed: !x.processed} : x); syncQueue.push({...db.find(x => String(x.id) === String(id)), action: 'save'}); saveData(false); renderList(); processSyncQueue(); }
    function saveData(pushCats = true) { localStorage.setItem('f_db_v20', JSON.stringify(db)); localStorage.setItem('f_cats_v20', JSON.stringify(categories)); localStorage.setItem('f_sync_q_v20', JSON.stringify(syncQueue)); if(pushCats) syncCategories('push'); }
    function updateTotals() { const bal = db.reduce((s,x) => x.type === 'income' ? s + parseFloat(x.amount) : s - parseFloat(x.amount), 0); document.getElementById('display-balance').innerText = bal.toLocaleString('sk-SK', {minimumFractionDigits:2}) + ' €'; }
    function updateSyncUI(status) { const dot = document.getElementById('sync-dot'); dot.className = (status === 'syncing') ? "w-2 bg-blue-500 animate-pulse rounded-full" : "w-2 bg-green-500 rounded-full"; document.getElementById('sync-text').innerText = (status === 'syncing') ? "..." : (syncQueue.length || "OK"); }
    function manualSync() { fullCloudPull(true); processSyncQueue(); }
    function initTimeFilters() { const mSelect = document.getElementById('filter-month'), ySelect = document.getElementById('filter-year'), months = ['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'], now = new Date(); mSelect.innerHTML = months.map((m, i) => `<option value="${i}" ${i === now.getMonth() ? 'selected' : ''}>${m}</option>`).join(''); const years = [...new Set([now.getFullYear(), ...db.map(x => new Date(x.date).getFullYear())])].sort((a,b) => b-a); ySelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join(''); }
    function handleDelete() { const id = document.getElementById('entry-id').value; if(confirm('Zmazať?')) { syncQueue.push({ id, action: 'delete' }); db = db.filter(x => String(x.id) !== String(id)); saveData(false); closeModal(); renderList(); processSyncQueue(); } }

    // --- SETTINGS LOGIKA ---
    function addCategory() { let n = document.getElementById('new-cat-name').value.trim(); if(n) { categories.push({id: n, icon: 'layers', subs: []}); document.getElementById('new-cat-name').value = ''; saveData(true); renderManageCats(); } }
    function renderManageCats() { document.getElementById('manage-cats-list').innerHTML = categories.map((c, i) => `<div class="p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 flex items-center justify-between shadow-sm"><div class="flex-1 cursor-pointer" onclick="openSubEditor(${i})"><div class="font-bold text-sm">${c.id}</div><div class="text-[9px] text-slate-400 uppercase font-bold">${c.subs.length} podkategórií</div></div><div class="flex gap-1"><button onclick="moveCat(${i}, -1)" class="p-2 text-slate-400"><i data-lucide="chevron-up" class="w-4 h-4"></i></button><button onclick="moveCat(${i}, 1)" class="p-2 text-slate-400"><i data-lucide="chevron-down" class="w-4 h-4"></i></button><button onclick="deleteCat(${i})" class="p-2 text-red-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join(''); lucide.createIcons(); }
    function openSubEditor(idx) { editingCatIdx = idx; document.getElementById('settings-home').classList.add('hidden'); document.getElementById('sub-editor').classList.remove('hidden'); document.getElementById('sub-editor-title').innerText = categories[idx].id; renderManageSubs(); }
    function renderManageSubs() { document.getElementById('manage-subs-list').innerHTML = categories[editingCatIdx].subs.map((s, i) => `<div class="p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 flex items-center justify-between"><span class="font-bold text-sm">${s}</span><button onclick="deleteSub(${i})" class="text-red-300"><i data-lucide="x" class="w-5 h-5"></i></button></div>`).join(''); lucide.createIcons(); }
    function addSubCategory() { let n = document.getElementById('new-sub-name').value.trim(); if(n && editingCatIdx !== null) { categories[editingCatIdx].subs.push(n); document.getElementById('new-sub-name').value = ''; saveData(true); renderManageSubs(); } }
    function deleteSub(i) { categories[editingCatIdx].subs.splice(i,1); saveData(true); renderManageSubs(); }
    function closeSubEditor() { document.getElementById('settings-home').classList.remove('hidden'); document.getElementById('sub-editor').classList.add('hidden'); }
    function moveCat(idx, dir) { let nIdx = idx + dir; if(nIdx >= 0 && nIdx < categories.length) { [categories[idx], categories[nIdx]] = [categories[nIdx], categories[idx]]; saveData(true); renderManageCats(); } }
    function deleteCat(i) { if(confirm('Zmazať?')) { categories.splice(i,1); saveData(true); renderManageCats(); } }
    function hardResetCategories() { if(confirm("Reset?")) { categories = JSON.parse(JSON.stringify(defaultCategories)); saveData(true); renderCatGrid(); } }

    window.onload = () => { initTimeFilters(); renderList(); renderCatGrid(); fullCloudPull(false); syncCategories('pull'); };
</script>
</body>
</html>
