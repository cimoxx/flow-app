<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow V20 Online</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .expense { color: red; }
        .income { color: green; }
        .total-income { color: green; font-weight: bold; }
        .total-expense { color: red; font-weight: bold; }
    </style>
</head>

<body>
    <h1>Flow V20 Online</h1>

    <!-- Summary -->
    <div id="summary">
        <p>Total Income: <span id="total-income" class="total-income">0 €</span></p>
        <p>Total Expense: <span id="total-expense" class="total-expense">0 €</span></p>
    </div>

    <!-- Input Form -->
    <div>
        <input type="number" id="amount" placeholder="Amount" min="-10000" max="10000">
        <input type="text" id="source" placeholder="Source/Note">
        <button onclick="addEntry()">Add</button>
        <button onclick="syncNow()">Sync 🔄</button>
    </div>

    <ul id="list"></ul>

<script>
// --------------------------------------
// STORAGE
// --------------------------------------
let db = [];
let syncQueue = [];
let syncing = false;

function saveData() {
    const payload = { db, syncQueue };
    localStorage.setItem("flowv20_db", JSON.stringify(payload));
}

function loadData() {
    const raw = localStorage.getItem("flowv20_db");
    if (!raw) return;
    try {
        const data = JSON.parse(raw);
        db = data.db || [];
        syncQueue = data.syncQueue || [];
    } catch (e) {
        console.log("Corrupted local storage");
    }
}

// --------------------------------------
// RENDER
// --------------------------------------
function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    let totalIncome = 0;
    let totalExpense = 0;

    db.forEach(item => {
        const li = document.createElement("li");
        li.className = item.type;

        if (item.type === "income") totalIncome += item.amount;
        else totalExpense += item.amount;

        li.innerHTML = ` 
            ${item.amount} € — ${item.source}
            <button onclick="toggleProcessed('${item.id}')">
                ${item.processed ? "✔" : "Mark"}
            </button>
            <button onclick="deleteEntry('${item.id}')">X</button>
        `;

        list.appendChild(li);
    });

    document.getElementById("total-income").innerText = totalIncome + " €";
    document.getElementById("total-expense").innerText = totalExpense + " €";
}

// --------------------------------------
// ADD ENTRY
// --------------------------------------
function addEntry() {
    const amountInput = document.getElementById("amount");
    const sourceInput = document.getElementById("source");

    const a = parseFloat(amountInput.value);
    if (!a) return;

    const entry = {
        id: Date.now().toString(),
        amount: Math.abs(a),
        type: a >= 0 ? "income" : "expense",
        source: sourceInput.value || "",
        createdAt: Date.now(),
        processed: false
    };

    db.push(entry);

    syncQueue.push({ 
        action: "save",
        entry
    });

    amountInput.value = "";
    sourceInput.value = "";

    saveData();
    renderList();
    processSyncQueue();
}

// --------------------------------------
// DELETE
// --------------------------------------
function deleteEntry(id) {
    db = db.filter(x => x.id !== id);

    syncQueue.push({
        action: "delete",
        id: id
    });

    saveData();
    renderList();
    processSyncQueue();
}

// --------------------------------------
// TOGGLE PROCESSED  ✔
// --------------------------------------
function toggleProcessed(id) {
    const i = db.findIndex(x => String(x.id) === String(id));
    if (i === -1) return;

    db[i].processed = !db[i].processed;

    syncQueue.push({
        id: db[i].id,
        processed: db[i].processed,
        action: "update_status"
    });

    saveData();
    renderList();
    processSyncQueue();
}

// --------------------------------------
// SYNC WITH GOOGLE APPS SCRIPT
// --------------------------------------
function processSyncQueue() {
    if (syncing || syncQueue.length === 0) return;
    syncing = true;

    const task = syncQueue.shift();

    $.post(
        "https://script.google.com/macros/s/AKfycbx_some_url/exec",
        task,
        function (response) {
            syncing = false;
            saveData();

            if (syncQueue.length > 0) processSyncQueue();
        }
    ).fail(function () {
        syncQueue.unshift(task);
        syncing = false;
    });
}

function syncNow() {
    $.get(
        "https://script.google.com/macros/s/AKfycbx_some_url/exec",
        function (remoteData) {
            db = remoteData;
            saveData();
            renderList();
        }
    );
}

// INIT
loadData();
renderList();
processSyncQueue();

</script>
</body>
</html>
